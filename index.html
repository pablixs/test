<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CAH Point — Precios</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#efefea;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.20);
  --text:#1a1a18;--text2:#6b6a65;--text3:#a8a7a2;
  --green-bg:#eaf3de;--green:#3b6d11;
  --blue-bg:#e6f1fb;--blue:#185fa5;
  --red-bg:#fcebeb;--red:#a32d2d;
  --r:10px;--rl:14px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--surface:#272725;--surface2:#313130;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
  --text:#f0efea;--text2:#9b9a96;--text3:#6b6a65;
  --green-bg:#17340a;--green:#97c459;
  --blue-bg:#042c53;--blue:#85b7eb;
  --red-bg:#501313;--red:#f09595
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:5rem}
header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:.875rem 1.25rem;position:sticky;top:0;z-index:20}
.hrow{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo span{font-weight:400;color:var(--text2)}
.main{max-width:720px;margin:0 auto;padding:1.25rem}
.panel{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.125rem 1.25rem;margin-bottom:1rem}
.panel-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.875rem}
.scrape-row{display:flex;gap:10px;align-items:stretch;flex-wrap:wrap}
.markup-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:var(--r);padding:8px 14px;flex:1;min-width:130px}
.markup-pill label{font-size:13px;color:var(--text2);white-space:nowrap}
.markup-pill input{width:58px;font-size:15px;font-weight:700;text-align:center;border:0.5px solid var(--border2);border-radius:7px;padding:4px 6px;background:var(--surface);color:var(--text);-moz-appearance:textfield}
.markup-pill input::-webkit-inner-spin-button,.markup-pill input::-webkit-outer-spin-button{-webkit-appearance:none}
.btn{flex:1;min-width:140px;background:var(--text);color:var(--bg);border:none;border-radius:var(--r);padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn:active{opacity:.7}
.btn:disabled{opacity:.4;cursor:not-allowed}
.sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status{border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:1rem;display:none;line-height:1.5}
.status.loading{background:var(--blue-bg);color:var(--blue)}
.status.error{background:var(--red-bg);color:var(--red)}
.status.ok{background:var(--green-bg);color:var(--green)}
.stats{display:none;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:.75rem 1rem}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:3px}
.stat-val{font-size:19px;font-weight:700;color:var(--text)}
#brandPanel{display:none}
.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;margin-bottom:1rem}
.brand-card{background:var(--surface2);border-radius:var(--r);padding:.875rem 1rem}
.brand-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.brand-name{font-size:14px;font-weight:700;color:var(--text)}
.brand-count{font-size:11px;color:var(--text2)}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row input[type=range]{flex:1;accent-color:var(--green);cursor:pointer}
.bval{font-size:14px;font-weight:700;color:var(--green);min-width:42px;text-align:right}
.brand-footer{display:flex;justify-content:flex-end;margin-top:4px}
.brand-reset{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;text-decoration:underline}
.brand-reset:hover{color:var(--text2)}
.apply-btn{width:100%;background:var(--green-bg);color:var(--green);border:none;border-radius:var(--r);padding:10px;font-size:14px;font-weight:700;cursor:pointer}
.apply-btn:active{opacity:.7}
.search-wrap{position:relative;margin-bottom:.75rem;display:none}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-bar{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:10px 12px 10px 38px;font-size:14px;color:var(--text)}
.search-bar::placeholder{color:var(--text3)}
.search-bar:focus{outline:none;border-color:var(--border2)}
.filter-wrap{display:none;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
.fp{font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .12s}
.fp.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:.875rem 1rem;display:flex;flex-direction:column;gap:6px}
.card-brand{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
.card-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
.card-prices{margin-top:auto}
.price-orig{font-size:12px;color:var(--text3);text-decoration:line-through;margin-bottom:2px}
.price-row{display:flex;align-items:center;justify-content:space-between}
.price-new{font-size:17px;font-weight:700;color:var(--green)}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--green-bg);color:var(--green)}
.empty{display:none;text-align:center;padding:4rem 1rem;color:var(--text2);font-size:14px}
.empty-icon{font-size:36px;margin-bottom:.5rem}
@media(max-width:420px){
  .stat-val{font-size:15px}
  .grid{grid-template-columns:1fr 1fr}
  .brand-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="logo">CAH Point <span>precios</span></div>
  </div>
</header>
<main class="main">
  <div class="panel">
    <div class="panel-title">Configuración</div>
    <div class="scrape-row">
      <div class="markup-pill">
        <label>Markup base %</label>
        <input type="number" id="markupBase" value="10" min="0" max="999" step="1"/>
      </div>
      <button class="btn" id="btnScrape" onclick="scrape()">
        <div class="sp" id="spinner"></div>
        <span id="btnText">Scrapear precios</span>
      </button>
    </div>
  </div>
  <div id="status" class="status"></div>
  <div id="stats" class="stats">
    <div class="stat"><div class="stat-lbl">Productos</div><div class="stat-val" id="sCount">—</div></div>
    <div class="stat"><div class="stat-lbl">Marcas</div><div class="stat-val" id="sBrands">—</div></div>
    <div class="stat"><div class="stat-lbl">Precio prom.</div><div class="stat-val" id="sAvg">—</div></div>
  </div>
  <div class="panel" id="brandPanel">
    <div class="panel-title">Markup por marca — arrastrá para ajustar</div>
    <div class="brand-grid" id="brandGrid"></div>
    <button class="apply-btn" onclick="applyMarkups()">Aplicar todos los markups →</button>
  </div>
  <div class="search-wrap" id="searchWrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" class="search-bar" id="search" placeholder="Buscar producto..." oninput="filterProducts()"/>
  </div>
  <div class="filter-wrap" id="filterWrap"></div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty"><div class="empty-icon">📦</div>No se encontraron productos.</div>
</main>
<script>
let allProducts = [];
let brands = {};
let activeBrand = 'Todos';

async function scrape() {
  const btn = document.getElementById('btnScrape');
  const spinner = document.getElementById('spinner');
  document.getElementById('btnText').textContent = 'Cargando...';
  btn.disabled = true; spinner.style.display = 'block';
  document.getElementById('stats').style.display = 'none';
  document.getElementById('brandPanel').style.display = 'none';
  document.getElementById('searchWrap').style.display = 'none';
  document.getElementById('filterWrap').style.display = 'none';
  document.getElementById('grid').innerHTML = '';
  document.getElementById('empty').style.display = 'none';

  const base = parseFloat(document.getElementById('markupBase').value) || 10;

  try {
    showStatus('loading', 'Obteniendo contenido de cah-point.vercel.app...');

    // Llamamos a nuestro propio endpoint serverless (mismo dominio, sin CORS)
    const pageRes = await fetch('/api/scrape');
    if (!pageRes.ok) {
      const e = await pageRes.json().catch(()=>({}));
      throw new Error(e.error || 'Error al scrapear (status ' + pageRes.status + ')');
    }
    const pageData = await pageRes.json();
    const html = pageData.html || '';

    if (!html) throw new Error('El sitio devolvió contenido vacío.');

    showStatus('loading', 'Detectando marcas y productos con IA...');

    const aiRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{
          role: 'user',
          content: `Analizá este HTML de un sitio de ventas de celulares y accesorios argentino. Extraé TODOS los productos con su nombre, precio y marca detectada (Xiaomi, Apple/iPhone, Motorola, Samsung, etc. Si no podés identificar la marca, poné "Otros").
Devolvé SOLO JSON válido sin backticks ni texto extra:
{"products":[{"name":"nombre","price":1234,"brand":"Marca"},...]}
El precio es solo el número (sin $ ni puntos de miles). Si no hay productos devolvé {"products":[]}.
HTML:
${html.substring(0, 18000)}`
        }]
      })
    });

    if (!aiRes.ok) {
      const e = await aiRes.json().catch(()=>({}));
      throw new Error(e.error?.message || 'Error API IA');
    }

    const aiData = await aiRes.json();
    const text = aiData.content?.map(c=>c.text||'').join('').trim() || '';
    const m = text.match(/\{[\s\S]*\}/);
    let parsed = {products:[]};
    if (m) { try { parsed = JSON.parse(m[0]); } catch(e){} }

    allProducts = (parsed.products || [])
      .map(p => ({
        name: p.name || '—',
        brand: capitalize(String(p.brand || 'Otros')),
        originalPrice: parseNum(p.price),
        newPrice: 0,
        markup: base
      }))
      .filter(p => p.originalPrice > 0);

    if (!allProducts.length) {
      showStatus('error', 'No se encontraron productos. El sitio puede requerir JavaScript para renderizar el contenido.');
      return;
    }

    const brandSet = [...new Set(allProducts.map(p=>p.brand))].sort();
    brands = {};
    brandSet.forEach(b => brands[b] = base);

    showStatus('ok', allProducts.length + ' productos · ' + brandSet.length + ' marcas detectadas.');
    renderStats(brandSet.length);
    renderBrandPanel();
    applyMarkups();
    document.getElementById('searchWrap').style.display = 'block';

  } catch(err) {
    showStatus('error', 'Error: ' + err.message);
  } finally {
    btn.disabled = false; spinner.style.display = 'none';
    document.getElementById('btnText').textContent = 'Scrapear precios';
  }
}

function renderBrandPanel() {
  const grid = document.getElementById('brandGrid');
  grid.innerHTML = Object.entries(brands).map(([b, m]) => {
    const count = allProducts.filter(p=>p.brand===b).length;
    const id = 'b_' + b.replace(/\W/g,'_');
    return `<div class="brand-card">
      <div class="brand-header">
        <div class="brand-name">${esc(b)}</div>
        <div class="brand-count">${count} prod.</div>
      </div>
      <div class="slider-row">
        <input type="range" min="0" max="200" step="1" value="${m}" id="sl_${id}"
          oninput="onSlider('${esc(b)}','${id}',this.value)"/>
        <div class="bval" id="bv_${id}">+${m}%</div>
      </div>
      <div class="brand-footer">
        <button class="brand-reset" onclick="resetBrand('${esc(b)}','${id}')">reset</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('brandPanel').style.display = 'block';
}

function onSlider(brand, id, val) {
  brands[brand] = parseFloat(val);
  document.getElementById('bv_' + id).textContent = '+' + val + '%';
}

function resetBrand(brand, id) {
  const base = parseFloat(document.getElementById('markupBase').value) || 10;
  brands[brand] = base;
  document.getElementById('sl_' + id).value = base;
  document.getElementById('bv_' + id).textContent = '+' + base + '%';
}

function applyMarkups() {
  allProducts = allProducts.map(p => ({
    ...p,
    markup: brands[p.brand] ?? 10,
    newPrice: p.originalPrice * (1 + (brands[p.brand] ?? 10) / 100)
  }));
  activeBrand = 'Todos';
  renderFilterPills();
  renderGrid(allProducts);
}

function renderStats(brandCount) {
  const avg = allProducts.reduce((a,p)=>a+p.originalPrice,0) / allProducts.length;
  document.getElementById('sCount').textContent = allProducts.length;
  document.getElementById('sBrands').textContent = brandCount;
  document.getElementById('sAvg').textContent = fmt(avg);
  document.getElementById('stats').style.display = 'grid';
}

function renderFilterPills() {
  const wrap = document.getElementById('filterWrap');
  const list = ['Todos', ...Object.keys(brands).sort()];
  wrap.innerHTML = list.map(b =>
    `<div class="fp${b===activeBrand?' active':''}" onclick="filterBrand('${esc(b)}')">${esc(b)}</div>`
  ).join('');
  wrap.style.display = 'flex';
}

function filterBrand(brand) {
  activeBrand = brand;
  renderFilterPills();
  applyFilters();
}

function filterProducts() { applyFilters(); }

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = activeBrand === 'Todos' ? allProducts : allProducts.filter(p=>p.brand===activeBrand);
  if (q) list = list.filter(p=>p.name.toLowerCase().includes(q));
  renderGrid(list);
}

function renderGrid(products) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!products.length) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = products.map(p => `
    <div class="card">
      <div class="card-brand">${esc(p.brand)}</div>
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-prices">
        <div class="price-orig">${fmt(p.originalPrice)}</div>
        <div class="price-row">
          <div class="price-new">${fmt(p.newPrice)}</div>
          <div class="badge">+${Math.round(p.markup)}%</div>
        </div>
      </div>
    </div>`).join('');
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-AR');
}

function parseNum(v) {
  return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : 'Otros';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
